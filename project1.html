<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge Finder X - Pro</title>
    <style>
        :root {
            --accent: #00ffcc;
            --bg: #0f0f0f;
            --card-bg: #1e1e1e;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        .light {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #1a1a1a;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid #444;
        }

        .slot-pill {
            background: #333;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-stop { background: #ff4444; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-map { background: #4285F4; color: white; margin-bottom: 5px; }

        #progressContainer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 255, 204, 0.05);
            border-radius: 15px;
            margin: 15px 0;
        }

        .progress-bar {
            height: 12px;
            background: #333;
            border-radius: 6px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease-in-out;
            box-shadow: 0 0 10px var(--accent);
        }

        .history-item {
            font-size: 0.85rem;
            border-bottom: 1px solid #444;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
        }

        /* QR Scanner Overlay */
        #scannerContainer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scanRegion {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 4px solid var(--accent);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 1.2rem;">EV Charge X 🔋</h1>
        <button onclick="toggleMode()" style="width: auto; padding: 5px 15px; font-size: 0.8rem;">Switch Theme</button>
    </header>

    <div class="container">
        <button class="btn-outline" onclick="getLocation()">📍 Detect My Location</button>
        <p id="locationText" style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 5px;">Waiting for GPS...</p>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h3 style="margin: 0;">Jio-bp Pulse</h3>
                    <p style="margin: 5px 0; font-size: 0.9rem; color: #aaa;">2.1 km • ₹18.50/kWh</p>
                </div>
                <span class="slot-pill">5 Slots Free</span>
            </div>
            <button class="btn-map" onclick="window.open('https://www.google.com/maps/search/EV+Charging+Station')">Navigate via Google Maps 🗺️</button>
            <button class="btn-primary" onclick="selectStation('Jio-bp Pulse Hub')">Select Station & Park</button>
        </div>

        <div id="billSection" style="display: none;">
            <div class="card" style="border: 2px solid var(--accent);">
                <h2 style="color: var(--accent); margin-top: 0; font-size: 1.3rem;">Active Session</h2>
                <p id="stationName" style="font-weight: bold; margin-bottom: 10px;"></p>
                
                <label style="font-size: 0.85rem; color: #888;">Select Your Parking Slot:</label>
                <select id="slotNumber" style="background: #333; color: white; border: 1px solid #555;">
                    <option value="Slot A-01 (Fast)">Slot A-01 (Fast)</option>
                    <option value="Slot A-02 (Fast)">Slot A-02 (Fast)</option>
                    <option value="Slot B-09 (Standard)">Slot B-09 (Standard)</option>
                </select>

                <div id="progressContainer">
                    <p style="margin:0; font-size: 0.75rem; color: #888; letter-spacing: 1px;">ENERGY CONSUMED</p>
                    <div style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;"><span id="unitsConsumed">0.00</span> <small style="font-size: 1rem;">kWh</small></div>
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                </div>

                <div id="actionButtons">
                    <button id="startBtn" class="btn-primary" onclick="startCharging()">START CHARGING</button>
                    <button id="stopBtn" class="btn-stop" onclick="stopCharging()" style="display:none;">STOP & PAY BILL</button>
                </div>

                <div id="paymentArea" style="display: none; margin-top: 20px;">
                    <div id="billDetails"></div>
                    <button class="btn-outline" onclick="downloadReceipt()">Download Receipt 📄</button>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0; font-size: 1.1rem;">History</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div id="scannerContainer">
        <video id="cameraStream" autoplay playsinline></video>
        <div class="scanRegion"></div>
        <div style="position:absolute; bottom:15%; width:100%; text-align:center; padding: 0 20px; box-sizing: border-box;">
            <p style="color: white; text-shadow: 1px 1px 5px black;">Scanning Station QR Code...</p>
            <button onclick="closeScanner()" class="btn-stop" style="width: auto; padding: 10px 40px;">Cancel</button>
        </div>
    </div>

    <script>
        let units = 0;
        let charging = false;
        let interval;
        let currentStation = "";
        let stream;

        function toggleMode() { document.body.classList.toggle("light"); }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById("locationText").innerText = `Lat: ${pos.coords.latitude.toFixed(4)}, Lon: ${pos.coords.longitude.toFixed(4)}`;
                }, () => {
                    document.getElementById("locationText").innerText = "Location access denied.";
                });
            }
        }

        function selectStation(name) {
            currentStation = name;
            document.getElementById("billSection").style.display = "block";
            document.getElementById("stationName").innerText = name;
            document.getElementById("billSection").scrollIntoView({ behavior: 'smooth' });
        }

        function startCharging() {
            charging = true;
            units = 0;
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("stopBtn").style.display = "block";
            document.getElementById("paymentArea").style.display = "none";
            
            interval = setInterval(() => {
                units += 0.18;
                document.getElementById("unitsConsumed").innerText = units.toFixed(2);
                document.getElementById("progressFill").style.width = Math.min(units * 8, 100) + "%";
            }, 600);
        }

        function stopCharging() {
            clearInterval(interval);
            charging = false;
            document.getElementById("stopBtn").style.display = "none";
            
            const slot = document.getElementById("slotNumber").value;
            const subtotal = units * 18.50;
            const gst = subtotal * 0.18;
            const total = (subtotal + gst).toFixed(2);
            
            document.getElementById("billDetails").innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px dashed #555;">
                    <div style="display:flex; justify-content:space-between"><span>Slot:</span> <span>${slot}</span></div>
                    <div style="display:flex; justify-content:space-between"><span>Energy:</span> <span>${units.toFixed(2)} kWh</span></div>
                    <div style="display:flex; justify-content:space-between"><span>GST (18%):</span> <span>₹${gst.toFixed(2)}</span></div>
                    <hr style="border: 0.5px solid #444;">
                    <h3 style="color: var(--accent); margin:0; text-align:right;">Total Paid: ₹${total}</h3>
                </div>
            `;
            
            if(confirm("Confirm payment of ₹" + total + "?")) {
                openScanner(total);
            } else {
                document.getElementById("startBtn").style.display = "block";
            }
        }

        async function openScanner(amt) {
            const scn = document.getElementById("scannerContainer");
            scn.style.display = "block";
            try {
                // Testing for Chrome file access
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById("cameraStream").srcObject = stream;
                
                setTimeout(() => {
                    closeScanner();
                    saveHistory(amt);
                    document.getElementById("paymentArea").style.display = "block";
                    document.getElementById("startBtn").style.display = "block";
                    alert("Payment Verified Successfully!");
                }, 2500);
            } catch (e) { 
                alert("Camera simulation: Payment processed without video access."); 
                closeScanner();
                saveHistory(amt);
                document.getElementById("paymentArea").style.display = "block";
                document.getElementById("startBtn").style.display = "block";
            }
        }

        function closeScanner() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById("scannerContainer").style.display = "none";
        }

        function saveHistory(amt) {
            const session = { date: new Date().toLocaleDateString(), station: currentStation, amt: amt };
            let history = JSON.parse(localStorage.getItem("ev_history") || "[]");
            history.unshift(session);
            localStorage.setItem("ev_history", JSON.stringify(history.slice(0, 5)));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById("historyList");
            const history = JSON.parse(localStorage.getItem("ev_history") || "[]");
            if(history.length === 0) { list.innerHTML = "<p style='color:#666; font-size:0.8rem;'>No recent sessions.</p>"; return; }
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <span><b>${h.date}</b><br><small>${h.station}</small></span>
                    <span style="color:var(--accent); font-weight:bold;">₹${h.amt}</span>
                </div>
            `).join('');
        }

        function downloadReceipt() {
            const slot = document.getElementById("slotNumber").value;
            const text = `EV CHARGE FINDER X\n====================\nDate: ${new Date().toLocaleString()}\nStation: ${currentStation}\nSlot: ${slot}\nUnits: ${units.toFixed(2)} kWh\nTotal: ₹${(units * 18.5 * 1.18).toFixed(2)}\n====================\nStatus: PAID`;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.href = URL.createObjectURL(blob);
            anchor.download = "EV_Receipt_X.txt";
            anchor.click();
        }

        renderHistory();
    </script>
</body>
</html>
